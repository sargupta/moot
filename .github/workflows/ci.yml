# GitHub Actions workflow for Moot.
#
# Security note: this workflow uses ONLY workflow-controlled context tokens
# (matrix.python-version, github.workflow, github.ref). It never interpolates
# untrusted user input into shell commands — there are no `run:` blocks that
# embed PR titles, issue bodies, commit messages, or branch names.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Pin Python
        env:
          PY_VER: ${{ matrix.python-version }}
        run: uv python install "$PY_VER"

      - name: Sync dependencies
        run: uv sync --extra dev --frozen

      - name: Run tests
        run: uv run pytest -q

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Pin Python
        run: uv python install 3.12

      - name: Sync dependencies (dev extras for ruff)
        run: uv sync --extra dev --frozen

      - name: Ruff
        run: uv run ruff check src tests
